<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>حياتي — تسجيل الدخول</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card animate-fade-in">
      <div class="auth-logo">
        <div class="auth-logo-icon">🌙</div>
        <h1 class="auth-title">حياتي</h1>
        <p class="auth-subtitle">رفيقك اليومي للتنظيم والانضباط</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label">البريد الإلكتروني</label>
          <input type="email" class="form-input" id="email" placeholder="example@email.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label">كلمة المرور</label>
          <input type="password" class="form-input" id="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <div id="error-msg" class="hidden" style="color:var(--danger);font-size:var(--font-size-sm);margin-bottom:var(--space-md);text-align:center;padding:var(--space-sm);background:rgba(245,101,101,0.1);border-radius:var(--radius-sm);border:1px solid rgba(245,101,101,0.3);"></div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
          تسجيل الدخول
        </button>
      </form>

      <div class="divider" style="margin:var(--space-xl) 0;"></div>
      <p style="text-align:center;font-size:var(--font-size-sm);color:var(--text-muted);">
        ليس لديك حساب؟
        <a href="/register.html" style="color:var(--pink-400);font-weight:700;margin-right:4px;">إنشاء حساب</a>
      </p>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('error-msg');
      err.classList.add('hidden');
      ui.setLoading(btn, true);
      try {
        const data = await api.post('/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        });
        auth.setSession(data.token, data.user);
        location.href = '/dashboard.html';
      } catch (error) {
        err.textContent = error.message;
        err.classList.remove('hidden');
      } finally {
        ui.setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
