<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>حياتي — رفيقك اليومي</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: var(--space-xl); position: relative; z-index: 1; }
    .hero-logo { width: 96px; height: 96px; background: linear-gradient(135deg, var(--burgundy-500), var(--pink-500)); border-radius: 28px; display: grid; place-items: center; font-size: 48px; margin: 0 auto var(--space-xl); box-shadow: var(--shadow-pink), var(--shadow-lg); animation: prayerPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .hero-title { font-size: clamp(48px, 10vw, 96px); font-weight: 900; background: linear-gradient(135deg, var(--text-primary), var(--pink-300)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: var(--space-sm); line-height: 1; }
    .hero-tagline { font-size: var(--font-size-xl); color: var(--text-muted); max-width: 400px; margin: 0 auto var(--space-2xl); }
    .hero-features { display: flex; gap: var(--space-md); flex-wrap: wrap; justify-content: center; margin-bottom: var(--space-2xl); }
    .feature-chip { display: flex; align-items: center; gap: var(--space-xs); background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-full); padding: 6px var(--space-md); font-size: var(--font-size-sm); color: var(--text-secondary); }
    .hero-actions { display: flex; gap: var(--space-md); flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>
  <div class="hero animate-fade-in">
    <div class="hero-logo">🌙</div>
    <h1 class="hero-title">حياتي</h1>
    <p class="hero-tagline">رفيقك اليومي للتنظيم والانضباط والتأمل</p>

    <div class="hero-features">
      <div class="feature-chip">✅ مهام يومية وشهرية</div>
      <div class="feature-chip">🤲 متابعة الصلوات</div>
      <div class="feature-chip">📓 يوميات شخصية</div>
      <div class="feature-chip">💰 تتبع الديون</div>
      <div class="feature-chip">⭐ بناء العادات</div>
    </div>

    <div class="hero-actions">
      <a href="/register.html" class="btn btn-primary btn-lg">ابدأ مجاناً ✨</a>
      <a href="/login.html" class="btn btn-secondary btn-lg">تسجيل الدخول</a>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // Redirect if already logged in
    if (auth.isLoggedIn()) location.href = '/dashboard.html';
  </script>
</body>
</html>
